[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
fuzz = { runs = 256 }
invariant = { runs = 64 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}" }
optimism_sepolia = { key = "${OPTIMISM_ETHERSCAN_API_KEY}" }
